<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E2E-Total-Time-Sheet</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root { --left-color: #0056b3; --right-color: #28a745; --bg: #f0f2f5; --danger: #dc3545; --history-bg: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        
        .header-info { display: flex; gap: 20px; margin-bottom: 20px; padding: 15px; background: #e9ecef; border-radius: 8px; align-items: flex-end; }
        .header-info div { flex: 1; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .side-col { padding: 20px; border-radius: 10px; border-top: 6px solid #ccc; background: #fff; border: 1px solid #ddd; }
        .left-side { border-top-color: var(--left-color); }
        .right-side { border-top-color: var(--right-color); }
        
        label { display: block; font-weight: bold; font-size: 0.8em; margin-bottom: 5px; color: #555; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; }
        
        .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .time-box { background: #f8f9fa; padding: 10px; border-radius: 5px; border: 1px solid #eee; }
        
        button { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; padding: 10px; }
        .btn-now { background: #6c757d; color: white; font-size: 10px; margin-top: 5px; width: 100%; }
        .btn-add { width: 100%; margin: 10px 0; background: #333; color: white; height: 45px; }

        .live-feed { margin-top: 10px; height: 180px; overflow-y: auto; background: #fafafa; border: 1px inset #eee; padding: 10px; border-radius: 5px; font-size: 0.85em; }
        .data-card { background: white; border: 1px solid #ddd; padding: 8px; margin-bottom: 8px; border-radius: 4px; border-left: 4px solid #333; }
        
        .actions { margin-top: 30px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .btn-summary { background: #17a2b8; color: white; height: 60px; font-size: 1em; }
        .btn-crew-swap { background: #212529; color: white; height: 60px; font-size: 1em; }
        .btn-reset-cycle { background: var(--danger); color: white; height: 60px; font-size: 1em; }
        .btn-history { background: #6f42c1; color: white; height: 60px; font-size: 1em; }
        
        #summaryDisplay { margin-top: 25px; white-space: pre-wrap; background: #fff; color: #333; padding: 30px; border: 3px solid #333; border-radius: 8px; display: none; font-family: 'Courier New', monospace; line-height: 1.5; }

        /* HISTORY POPUP STYLES */
        #historyPopup { display: none; position: fixed; top: 10%; left: 5%; width: 90%; height: 80%; background: white; border: 4px solid #333; border-radius: 12px; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.3); overflow: hidden; }
        #popupHeader { background: #333; color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #popupContent { padding: 20px; height: calc(100% - 60px); overflow-y: auto; }
        #historyTable { width: 100%; border-collapse: collapse; font-size: 0.8em; white-space: nowrap; }
        #historyTable th, #historyTable td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        #historyTable th { background-color: #f2f2f2; position: sticky; top: 0; }
        .close-popup { cursor: pointer; background: var(--danger); color: white; border-radius: 50%; width: 30px; height: 30px; border: none; font-weight: bold; }
        .btn-copy-history { background: #28a745; color: white; padding: 10px 20px; margin-right: 15px; }
        .btn-clear-history { background: var(--danger); color: white; padding: 10px 20px; margin-right: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-info">
        <div><label>Robot ID</label><select id="robotId"><option>Ares-59</option><option>Ares-54</option><option>Ares-53</option><option>Ares-60</option><option>Ares-55</option></select></div>
        <div><label>Date</label><input type="date" id="opDate"></div>
        <div><label>Cycle Start Time</label><input type="time" id="cycleStartTime" value="11:30"></div>
    </div>

    <div class="dashboard">
        <div class="side-col left-side">
            <h3 style="color:var(--left-color)">LEFT SIDE</h3>
            <label>Operator Name</label>
            <input type="text" id="pName-left" placeholder="Current Pilot...">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <select id="tong-left"></select>
                <select id="trunk-left"></select>
            </div>
            <div class="time-grid">
                <div class="time-box"><label>Start</label><input type="time" id="start-left"><button class="btn-now" onclick="setTime('start-left')">NOW</button></div>
                <div class="time-box"><label>End</label><input type="time" id="end-left"><button class="btn-now" onclick="setTime('end-left')">NOW</button></div>
            </div>
            <label>Maintenance / Delay Notes</label>
            <input type="text" id="maint-left" placeholder="Notes">
            <button class="btn-add" id="btn-left" onclick="saveToCloud('left')">SAVE ENTRY</button>
            <div id="feed-left" class="live-feed"></div>
        </div>

        <div class="side-col right-side">
            <h3 style="color:var(--right-color)">RIGHT SIDE</h3>
            <label>Operator Name</label>
            <input type="text" id="pName-right" placeholder="Current Pilot...">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <select id="tong-right"></select>
                <select id="trunk-right"></select>
            </div>
            <div class="time-grid">
                <div class="time-box"><label>Start</label><input type="time" id="start-right"><button class="btn-now" onclick="setTime('start-right')">NOW</button></div>
                <div class="time-box"><label>End</label><input type="time" id="end-right"><button class="btn-now" onclick="setTime('end-right')">NOW</button></div>
            </div>
            <label>Maintenance / Delay Notes</label>
            <input type="text" id="maint-right" placeholder="Notes">
            <button class="btn-add" id="btn-right" onclick="saveToCloud('right')">SAVE ENTRY</button>
            <div id="feed-right" class="live-feed"></div>
        </div>
    </div>

    <div class="actions">
        <button class="btn-crew-swap" onclick="swapCrew()"> RESET NAMES</button>
        <button class="btn-summary" onclick="showSummary()"> VIEW SUMMARY</button>
        <button class="btn-history" onclick="showAllOperations()"> SHOW ALL DATA</button> 
        <button class="btn-reset-cycle" onclick="doubleWarningReset()"> RESET CYCLE</button>
    </div>
    <div id="summaryDisplay"></div>
</div>

<div id="historyPopup">
    <div id="popupHeader">
        <span>Ares-59 Operation Log (Excel Format)</span>
        <div>
            <button class="btn-clear-history" onclick="clearFullDatabase()"> CLEAR DATA</button>
            <button class="btn-copy-history" onclick="copyHistoryTable()"> COPY FOR EXCEL</button>
            <button class="close-popup" onclick="closePopup()">X</button>
        </div>
    </div>
    <div id="popupContent">
        <table id="historyTable">
            <thead>
                <tr>
                    <th colspan="2">Operator</th>
                    <th rowspan="2">Tong#</th>
                    <th rowspan="2">Trunk#</th>
                    <th colspan="2">Left Side Time</th>
                    <th colspan="2">Right Side Time</th>
                    <th colspan="2">Total Side Time</th>
                    <th colspan="2">Idle Time</th>
                </tr>
                <tr>
                    <th>Left</th>
                    <th>Right</th>
                    <th>Start</th>
                    <th>End</th>
                    <th>Start</th>
                    <th>End</th>
                    <th>Left</th>
                    <th>Right</th>
                    <th>Left</th>
                    <th>Right</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAI4mN_SeCJV9BRR5HWq1NGMQ5vaos7sbM",
        authDomain: "e2e-time-sheet.firebaseapp.com",
        databaseURL: "https://e2e-time-sheet-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "e2e-time-sheet",
        storageBucket: "e2e-time-sheet.firebasestorage.app",
        messagingSenderId: "547961861130",
        appId: "1:547961861130:web:e6aa01484f4a7cb7e01bf3",
        measurementId: "G-MBRJWKQS86"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function updateDateInput() { document.getElementById('opDate').valueAsDate = new Date(); }
    updateDateInput();

    const suffixes = ["st", "nd", "rd", "th", "th", "th", "th", "th", "th"];
    function setupDropdowns(side) {
        const tong = document.getElementById(`tong-${side}`);
        const trunk = document.getElementById(`trunk-${side}`);
        for(let i=1; i<=9; i++) {
            tong.options.add(new Option(i + suffixes[i-1] + " Tong", i));
            trunk.options.add(new Option(i + suffixes[i-1] + " Trunk", i));
        }
    }
    setupDropdowns('left'); setupDropdowns('right');

    function setTime(id) { document.getElementById(id).value = new Date().toTimeString().slice(0,5); }
    
    function formatAMPM(t24) {
        if(!t24) return "";
        let [h, m] = t24.split(':');
        let am = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return `${h}:${m} ${am}`;
    }

    function calculateDuration(s, e) {
        if(!s || !e) return "0:00:00";
        let start = new Date(0,0,0, ...s.split(':'));
        let end = new Date(0,0,0, ...e.split(':'));
        if (end < start) end.setDate(end.getDate() + 1);
        let diff = end - start;
        return `${Math.floor(diff/3600000)}:${Math.floor((diff%3600000)/60000).toString().padStart(2, '0')}:00`;
    }

   function saveToCloud(side) {
        const btn = document.getElementById(`btn-${side}`);
        const p = document.getElementById(`pName-${side}`).value.trim();
        const s = document.getElementById(`start-${side}`).value;
        const e = document.getElementById(`end-${side}`).value;
        const robot = document.getElementById('robotId').value;
        const dateStr = document.getElementById('opDate').value;
        const tngB = document.getElementById(`tong-${side}`);
        const trkB = document.getElementById(`trunk-${side}`);
        const tLabel = tngB.options[tngB.selectedIndex].text;
        const maintBox = document.getElementById(`maint-${side}`);
        const maintValue = maintBox.value.trim();

        if(!p || !s || !e) return alert("Missing Pilot Name or Times!");

        btn.disabled = true;
        btn.innerText = "SAVING...";

        const path = `logs/${robot}/${dateStr}/${side}/${tLabel.replace(/ /g, '_')}`;
        
        db.ref(path).once('value').then((snap) => {
            let data = snap.val() || { tongLabel: tLabel, rawStart: s, pilotStats: {}, maint: "", trunks: [] };
            
            // FIX: Ensure 'trunks' exists even if 'data' was partially found without it
            if (!data.trunks) {
                data.trunks = [];
            }

            data.pilotStats[p] = (data.pilotStats[p] || 0) + 1;
            data.endAMPM = formatAMPM(e);
            data.rawEnd = e;
            data.duration = calculateDuration(data.rawStart, e);
            
            if(maintValue) {
                data.maint = data.maint ? (data.maint + " | " + maintValue) : maintValue;
            }

            data.trunks.push({
                operatorName: p,
                tongNumber: tngB.selectedIndex + 1,
                trunkNumber: trkB.selectedIndex + 1,
                startTime: s,
                endTime: e,
                duration: calculateDuration(s, e)
            });

            return db.ref(path).set(data);
        }).then(() => {
            document.getElementById(`start-${side}`).value = e;
            maintBox.value = ""; 
            
            if(trkB.selectedIndex < 8) {
                trkB.selectedIndex++;
            } else {
                if(tngB.selectedIndex < 8) {
                    tngB.selectedIndex++;
                    trkB.selectedIndex = 0;
                }
            }
            btn.disabled = false;
            btn.innerText = "SAVE ENTRY";
        }).catch((error) => {
            btn.disabled = false;
            btn.innerText = "SAVE ENTRY";
            console.error(error);
            alert("Firebase Error: " + error.message);
        });
    }

    // Dynamic Robot & Date Filtering
    function loadRobotData() {
        const robot = document.getElementById('robotId').value;
        const dateStr = document.getElementById('opDate').value;
        
        // Remove old listeners to prevent memory leaks or data ghosting
        db.ref(`logs/${robot}/${dateStr}`).off();

        // Listen specifically to the selected Robot and Date
        db.ref(`logs/${robot}/${dateStr}`).on('value', (snap) => {
            const data = snap.val() || {};
            ['left', 'right'].forEach(side => {
                const feed = document.getElementById(`feed-${side}`);
                feed.innerHTML = ""; // Clear existing UI feeds immediately
                
                const sideData = data?.[side];
                if(sideData) {
                    // Sort Tongs in descending order for the live feed (newest on top)
                    Object.values(sideData).sort((a,b) => b.tongLabel.localeCompare(a.tongLabel)).forEach(entry => {
                        const card = document.createElement('div');
                        card.className = 'data-card';
                        
                        let pilotList = Object.entries(entry.pilotStats)
                            .map(([name, count]) => `${name} (${count})`)
                            .join(', ');
                            
                        let maintDisplay = entry.maint ? 
                            `<br><span style="color:#dc3545; font-weight:bold;">⚠️ ${entry.maint}</span>` : "";
                        
                        card.innerHTML = `
                            <b>${entry.tongLabel}</b><br>
                            Pilots: ${pilotList}<br>
                            End: ${entry.endAMPM}
                            ${maintDisplay}
                        `;
                        feed.appendChild(card);
                    });
                }
            });
        });
    }

    // Attach the loadRobotData function to robotId select and opDate input
    document.getElementById('robotId').addEventListener('change', loadRobotData);
    document.getElementById('opDate').addEventListener('change', loadRobotData);
    
    // Initial call to populate data on load
    loadRobotData();

    // Summary View
    function showSummary() {
        const robot = document.getElementById('robotId').value;
        const dateStr = document.getElementById('opDate').value;
        const cycleStart = document.getElementById('cycleStartTime').value;
        const display = document.getElementById('summaryDisplay');

        db.ref(`logs/${robot}/${dateStr}`).once('value').then((snap) => {
            const data = snap.val();
            if(!data) return alert("No data recorded yet!");

            let report = `Note: This cycle started at ${formatAMPM(cycleStart)}\n\n`;
            
            ['left', 'right'].forEach(side => {
                report += `${side.charAt(0).toUpperCase() + side.slice(1)} side:\n`;
                const sideData = data[side];
                
                if(!sideData) {
                    report += "No activity recorded.\n\n";
                } else {
                    // Sort Tongs numerically (1st, 2nd, etc.)
                    const sortedTongs = Object.keys(sideData).sort((a, b) => {
                        return parseInt(a) - parseInt(b);
                    });

                    sortedTongs.forEach(tongKey => {
                        const tong = sideData[tongKey];
                        const pilots = Object.keys(tong.pilotStats || {}).join(', ');
                        
                        report += `${tong.tongLabel}:\n`;
                        report += `End: ${tong.endAMPM || "N/A"}\n`;
                        report += `Overall Time: ${tong.duration || "0:00:00"}\n`;
                        report += `Pilots: ${pilots || "Unknown"}\n`;
                        
                        if(tong.maint) {
                            report += `Maintenance: ${tong.maint}\n`;
                        }
                        report += `\n`;
                    });
                }
                
                if(side === 'left') {
                    report += `========================================\n\n`;
                }
            });

            // Inject and show
            display.innerText = report;
            display.style.display = 'block';
            display.scrollIntoView({ behavior: 'smooth' });
        });
    }

    function swapCrew() {
        document.getElementById('pName-left').value = ""; document.getElementById('pName-right').value = "";
        document.getElementById('maint-left').value = ""; document.getElementById('maint-right').value = "";
    }

    function doubleWarningReset() {
        const robot = document.getElementById('robotId').value;
        const dateStr = document.getElementById('opDate').value;
        if(confirm(`⚠️ RESET CYCLE: Are you sure you want to reset the local counters back to 1st Tong/Trunk?`)) {
            if(confirm("❗ FINAL CHECK: This will NOT delete data from the database, but will reset your active tracking counters on screen. Continue?")) {
                document.getElementById('summaryDisplay').style.display = 'none';
                ['left', 'right'].forEach(s => {
                    document.getElementById(`tong-${s}`).selectedIndex = 0;
                    document.getElementById(`trunk-${s}`).selectedIndex = 0;
                });
                alert(" counters Reset locally. Cloud history is safe.");
            }
        }
    }

    // --- NEW: HISTORY POPUP LOGIC (Excel Table format) ---
    function showAllOperations() {
        const robot = document.getElementById('robotId').value;
        const dateStr = document.getElementById('opDate').value;

        db.ref(`logs/${robot}/${dateStr}`).once('value').then((snap) => {
            const data = snap.val();
            if(!data) return alert("No history found for this Robot/Date.");

            const historyBody = document.getElementById('historyBody');
            historyBody.innerHTML = "";

            // We need to collate all trunk-by-trunk logs from both sides
            let allLeftTrunks = [];
            let allRightTrunks = [];

            if(data.left) {
                Object.values(data.left).forEach(tongData => {
                    if(tongData.trunks) allLeftTrunks = allLeftTrunks.concat(tongData.trunks);
                });
            }
            if(data.right) {
                Object.values(data.right).forEach(tongData => {
                    if(tongData.trunks) allRightTrunks = allRightTrunks.concat(tongData.trunks);
                });
            }

            // Determine max rows needed
            const maxRows = Math.max(allLeftTrunks.length, allRightTrunks.length);

            // Populate table matching reference image columns
            for(let i=0; i<maxRows; i++) {
                const lTrunk = allLeftTrunks[i] || {};
                const rTrunk = allRightTrunks[i] || {};
                
                // Use left data for Tong/Trunk numbers if both present, otherwise right.
                // For "plugs" view, we match them sequentially as they appear.
                const trkNum = lTrunk.trunkNumber || rTrunk.trunkNumber || i+1;
                const tongNum = lTrunk.tongNumber || rTrunk.tongNumber || Math.ceil((i+1)/9);

                const row = `<tr>
                    <td>${lTrunk.operatorName || ""}</td> 
                    <td>${rTrunk.operatorName || ""}</td>
                    <td>${tongNum}</td>
                    <td>${trkNum}</td>
                    <td>${dateStr} ${lTrunk.startTime || ""}</td> <td>${dateStr} ${lTrunk.endTime || ""}</td>
                    <td>${dateStr} ${rTrunk.startTime || ""}</td>
                    <td>${dateStr} ${rTrunk.endTime || ""}</td>
                    <td>${lTrunk.duration || "0:00:00"}</td>
                    <td>${rTrunk.duration || "0:00:00"}</td>
                    <td>0:00:00</td> <td>0:00:00</td>
                </tr>`;
                historyBody.innerHTML += row;
            }

            // Update Header Name
            document.getElementById('popupHeader').querySelector('span').innerText = `${robot} Operations Log (${dateStr})`;
            // Show the popup
            document.getElementById('historyPopup').style.display = 'block';
        });
    }

    function closePopup() {
        document.getElementById('historyPopup').style.display = 'none';
    }

    function copyHistoryTable() {
        const table = document.getElementById('historyTable');
        let range = document.createRange();
        range.selectNode(table);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        try {
            document.execCommand('copy');
            alert("Table copied! Paste into Excel.");
        } catch (err) {
            alert("Unable to copy.");
        }
        window.getSelection().removeAllRanges();
    }
    
    function clearFullDatabase() {
        const robot = document.getElementById('robotId').value;
        const dateStr = document.getElementById('opDate').value;
        if (confirm(`WIPE ALL ${robot} data for ${dateStr}?`)) {
            db.ref(`logs/${robot}/${dateStr}`).remove().then(() => { alert("Cleared."); closePopup(); });
        }
    }
</script>
</body>
</html>
