<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E2E-Total-Time-Sheet</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root { --left-color: #0056b3; --right-color: #28a745; --bg: #f0f2f5; --danger: #dc3545; --history-bg: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        
        .header-info { display: flex; gap: 20px; margin-bottom: 20px; padding: 15px; background: #e9ecef; border-radius: 8px; align-items: flex-end; }
        .header-info div { flex: 1; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .side-col { padding: 20px; border-radius: 10px; border-top: 6px solid #ccc; background: #fff; border: 1px solid #ddd; }
        .left-side { border-top-color: var(--left-color); }
        .right-side { border-top-color: var(--right-color); }
        
        label { display: block; font-weight: bold; font-size: 0.8em; margin-bottom: 5px; color: #555; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; }
        
        .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .time-box { background: #f8f9fa; padding: 10px; border-radius: 5px; border: 1px solid #eee; }
        
        button { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; padding: 10px; }
        .btn-now { background: #6c757d; color: white; font-size: 10px; margin-top: 5px; width: 100%; }
        .btn-add { width: 100%; margin: 10px 0; background: #333; color: white; height: 45px; }

        .live-feed { margin-top: 10px; height: 180px; overflow-y: auto; background: #fafafa; border: 1px inset #eee; padding: 10px; border-radius: 5px; font-size: 0.85em; }
        .data-card { background: white; border: 1px solid #ddd; padding: 8px; margin-bottom: 8px; border-radius: 4px; border-left: 4px solid #333; }
        
        .actions { margin-top: 30px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .btn-summary { background: #17a2b8; color: white; height: 60px; font-size: 1em; }
        .btn-crew-swap { background: #212529; color: white; height: 60px; font-size: 1em; }
        .btn-reset-cycle { background: var(--danger); color: white; height: 60px; font-size: 1em; }
        .btn-history { background: #6f42c1; color: white; height: 60px; font-size: 1em; }
        
        #summaryDisplay { 
            margin-top: 25px; 
            white-space: pre-wrap; 
            background: #fff; 
            color: #333; 
            padding: 30px; 
            border: 3px solid #333; 
            border-radius: 8px; 
            display: none; 
            font-family: 'Courier New', monospace; 
            line-height: 1.5;
            outline: none; 
        }

        #historyPopup { display: none; position: fixed; top: 5%; left: 2%; width: 96%; height: 90%; background: white; border: 4px solid #333; border-radius: 12px; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.3); overflow: hidden; }
        #popupHeader { background: #333; color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #popupContent { padding: 20px; height: calc(90vh - 160px); overflow-y: auto; }
        .search-bar-container { background: #f4f4f4; padding: 10px 20px; border-bottom: 1px solid #ddd; }
        #historySearch { width: 100%; padding: 10px; border-radius: 20px; border: 1px solid #ccc; font-size: 0.9em; }

        #historyTable { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        #historyTable th, #historyTable td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        #historyTable td[contenteditable="true"] { background-color: #fffcf0; cursor: text; }
        #historyTable th { background-color: #f2f2f2; position: sticky; top: 0; }
        .close-popup { cursor: pointer; background: var(--danger); color: white; border-radius: 50%; width: 30px; height: 30px; border: none; font-weight: bold; }
        .btn-copy-history { background: #28a745; color: white; padding: 10px 20px; margin-right: 15px; }
        .btn-clear-history { background: var(--danger); color: white; padding: 10px 20px; margin-right: 15px; }
        .btn-save-edit { background: #007bff; color: white; padding: 10px 20px; margin-right: 15px; }
    </style>
</head>
<body>

<datalist id="operatorList">
    <option value="Jodel Malana"><option value="Jose Babasa"><option value="Nico Morana"><option value="Clay Samson"><option value="Cristhian Aldunar"><option value="Erwin Kyle Coronel"><option value="Jean Alexis"><option value="Alma Dagatan"><option value="Luis Obumani"><option value="King Russell Nolasco"><option value="Jaslyn Alano"><option value="Jasmine Balatico"><option value="Laila Fuellas"><option value="Jorge Geronimo"><option value="Wendell Reformado"><option value="Dane Cuenca"><option value="Naethan Alsola"><option value="Miguel Barrinuevo"><option value="Christian Leona"><option value="Danica Fuderanan"><option value="Trisha Linda"><option value="Von Aguilar"><option value="Jenny Faustino"><option value="Via De Ocampo"><option value="Marinela Devio"><option value="Janna Silla"><option value="Reymar Bucao"><option value="Angelie Relo"><option value="Kurt Bautista"><option value="Amiel Ygano"><option value="Mark Altabano"><option value="Emmanuel John Sapitan"><option value="Keon Peralta"><option value="Riza Dayson"><option value="Earl Espiritu"><option value="Timothy Bautista"><option value="Johannes Silla"><option value="Prince Puno"><option value="Warren Bolanos"><option value="Vincent Carungcong"><option value="Jhon Jhercey Maligalig"><option value="Nelson Austria"><option value="Gio Salvacion"><option value="Kathleen Dimaano"><option value="Miel Tadic"><option value="Phillip Parot"><option value="Paul Hernandez"><option value="Psalm Malimban">
</datalist>

<div class="container">
    <div class="header-info">
        <div><label>Robot ID</label>
            <select id="robotId">
                <option>Ares-59</option><option>Ares-56</option><option>Ares-54</option><option>Ares-53</option><option>Ares-60</option><option>Ares-55</option><option>Rack 34 (Team 1)</option><option>Rack 35 (Team 0)</option>
            </select>
        </div>
        <div><label>View Data For Date</label><input type="date" id="opDate"></div>
        <div><label>Cycle Start Time</label><input type="time" id="cycleStartTime" value="11:30"></div>
    </div>

    <div class="dashboard">
        <div class="side-col left-side">
            <h3 style="color:var(--left-color)">LEFT SIDE</h3>
            <label>Operator Name</label>
            <input type="text" id="pName-left" list="operatorList" placeholder="Current Pilot...">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <select id="tong-left"></select>
                <select id="trunk-left"></select>
            </div>
            <div class="time-grid">
                <div class="time-box"><label>Start</label><input type="time" id="start-left"><button class="btn-now" onclick="setTime('start-left')">NOW</button></div>
                <div class="time-box"><label>End</label><input type="time" id="end-left"><button class="btn-now" onclick="setTime('end-left')">NOW</button></div>
            </div>
            <label>Maintenance / Delay Notes</label>
            <input type="text" id="maint-left" placeholder="Notes">
            <button class="btn-add" id="btn-left" onclick="saveToCloud('left')">SAVE ENTRY</button>
            <div id="feed-left" class="live-feed"></div>
        </div>

        <div class="side-col right-side">
            <h3 style="color:var(--right-color)">RIGHT SIDE</h3>
            <label>Operator Name</label>
            <input type="text" id="pName-right" list="operatorList" placeholder="Current Pilot...">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <select id="tong-right"></select> 
                <select id="trunk-right"></select>
            </div>
            <div class="time-grid">
                <div class="time-box"><label>Start</label><input type="time" id="start-right"><button class="btn-now" onclick="setTime('start-right')">NOW</button></div>
                <div class="time-box"><label>End</label><input type="time" id="end-right"><button class="btn-now" onclick="setTime('end-right')">NOW</button></div>
            </div>
            <label>Maintenance / Delay Notes</label>
            <input type="text" id="maint-right" placeholder="Notes">
            <button class="btn-add" id="btn-right" onclick="saveToCloud('right')">SAVE ENTRY</button>
            <div id="feed-right" class="live-feed"></div>
        </div>
    </div>

    <div class="actions">
        <button class="btn-crew-swap" onclick="swapCrew()"> RESET NAMES</button>
        <button class="btn-summary" onclick="showSummary()"> VIEW SUMMARY</button>
        <button class="btn-history" onclick="showAllOperations()"> SHOW ALL DATA</button> 
        <button class="btn-reset-cycle" onclick="doubleWarningReset()"> RESET CYCLE</button>
    </div>
    <div id="summaryDisplay" contenteditable="true"></div>
</div>

<div id="historyPopup">
    <div id="popupHeader">
        <span>Operation Log</span>
        <div>
            <button id="btn-save-edit" class="btn-save-edit" onclick="saveTableEdits()"> SAVE CHANGES</button>
            <button class="btn-clear-history" onclick="clearFullDatabase()"> CLEAR DATA</button>
            <button class="btn-copy-history" onclick="copyHistoryTable()"> COPY FOR EXCEL</button>
            <button class="close-popup" onclick="closePopup()">X</button>
        </div>
    </div>
    <div class="search-bar-container">
        <input type="text" id="historySearch" placeholder="Search by Pilot, Tong, or Trunk number..." onkeyup="filterHistoryTable()">
    </div>
    <div id="popupContent">
        <table id="historyTable">
            <thead>
                <tr>
                    <th colspan="2">Operator</th>
                    <th rowspan="2">Tong#</th>
                    <th rowspan="2">Trunk#</th>
                    <th colspan="2">Left Side Time</th>
                    <th colspan="2">Right Side Time</th>
                    <th colspan="2">Total Side Time</th>
                    <th colspan="2">Idle Time</th>
                    <th rowspan="2">Delete</th>
                </tr>
                <tr>
                    <th>Left</th>
                    <th>Right</th>
                    <th>Start</th>
                    <th>End</th>
                    <th>Start</th>
                    <th>End</th>
                    <th>Left</th>
                    <th>Right</th>
                    <th>Left</th>
                    <th>Right</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAI4mN_SeCJV9BRR5HWq1NGMQ5vaos7sbM",
        authDomain: "e2e-time-sheet.firebaseapp.com",
        databaseURL: "https://e2e-time-sheet-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "e2e-time-sheet",
        storageBucket: "e2e-time-sheet.firebasestorage.app",
        messagingSenderId: "547961861130",
        appId: "1:547961861130:web:e6aa01484f4a7cb7e01bf3",
        measurementId: "G-MBRJWKQS86"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const suffixes = ["st", "nd", "rd", "th", "th", "th", "th", "th", "th"];

    function updateDateInput() { 
        const dateInput = document.getElementById('opDate');
        if (!dateInput.value) {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            dateInput.value = `${year}-${month}-${day}`;
        }
    }
    updateDateInput();

    function setupDropdowns(side) {
        const t = document.getElementById(`tong-${side}`);
        const tr = document.getElementById(`trunk-${side}`);
        for(let i=1; i<=8; i++) {
            t.options.add(new Option(i + suffixes[i-1] + " Tong", i));
        }
        for(let i=1; i<=9; i++) {
            tr.options.add(new Option(i + suffixes[i-1] + " Trunk", i));
        }
    }
    setupDropdowns('left'); setupDropdowns('right');

    function setTime(id) { document.getElementById(id).value = new Date().toTimeString().slice(0,5); }
    
    function formatAMPM(t24) {
        if(!t24) return "";
        let [h, m] = t24.split(':');
        let am = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return `${h}:${m} ${am}`;
    }

    function swapCrew() {
        document.getElementById('pName-left').value = "";
        document.getElementById('pName-right').value = "";
        ['left', 'right'].forEach(s => {
            document.getElementById(`tong-${s}`).selectedIndex = 0;
            document.getElementById(`trunk-${s}`).selectedIndex = 0;
        });
        document.getElementById('summaryDisplay').style.display = 'none';
    }

    function getFullDateTimeStr(baseDateStr, time24, isEndTime = false, startTime24 = null) {
        if(!time24) return "";
        const [y, m, d] = baseDateStr.split('-').map(Number);
        let date = new Date(y, m - 1, d);
        if (isEndTime && startTime24 && time24 < startTime24) { date.setDate(date.getDate() + 1); }
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        return `${months[date.getMonth()]} ${String(date.getDate()).padStart(2, '0')}, ${date.getFullYear()} ${formatAMPM(time24)}`;
    }

    function calculateDuration(s, e) {
        if(!s || !e) return "0:00:00";
        let start = new Date(0,0,0, ...s.split(':'));
        let end = new Date(0,0,0, ...e.split(':'));
        if (end < start) end.setDate(end.getDate() + 1);
        let diff = end - start;
        let hh = Math.floor(diff/3600000);
        let mm = Math.floor((diff%3600000)/60000);
        return `${hh}:${mm.toString().padStart(2, '0')}:00`;
    }

    function saveToCloud(side) {
        const p = document.getElementById(`pName-${side}`).value.trim();
        const s = document.getElementById(`start-${side}`).value;
        const e = document.getElementById(`end-${side}`).value;
        const robot = document.getElementById('robotId').value;
        
        // AUTOMATIC CURRENT DATE FOR SAVING
        const now = new Date();
        const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        
        const tngB = document.getElementById(`tong-${side}`);
        const trkB = document.getElementById(`trunk-${side}`);
        const tLabel = tngB.options[tngB.selectedIndex].text;
        const maint = document.getElementById(`maint-${side}`);

        if(!p || !s || !e) return alert("Missing Info!");
        document.getElementById(`btn-${side}`).innerText = "SAVING...";

        const path = `logs/${robot}/${dateStr}/${side}/${tLabel.replace(/ /g, '_')}`;
        db.ref(path).once('value').then(snap => {
            let data = snap.val() || { tongLabel: tLabel, rawStart: s, pilotStats: {}, trunks: [] };
            data.pilotStats[p] = (data.pilotStats[p] || 0) + 1;
            data.endAMPM = formatAMPM(e);
            data.rawEnd = e;
            data.duration = calculateDuration(data.rawStart, e);
            if(!data.trunks) data.trunks = [];
            data.trunks.push({
                operatorName: p, tongNumber: parseInt(tngB.value), trunkNumber: parseInt(trkB.value),
                startTime: s, endTime: e, duration: calculateDuration(s, e)
            });
            return db.ref(path).set(data);
        }).then(() => {
            document.getElementById(`start-${side}`).value = e;
            maint.value = "";
            if(trkB.selectedIndex < 8) trkB.selectedIndex++;
            else if(tngB.selectedIndex < 7) { 
                tngB.selectedIndex++; 
                trkB.selectedIndex = 0; 
            }
            document.getElementById(`btn-${side}`).innerText = "SAVE ENTRY";
            
            // Update the Top Date Picker to today's date so user sees what they just saved
            document.getElementById('opDate').value = dateStr;
            loadRobotData(); 
        });
    }

    let currentListener = null;

    function loadRobotData() {
        const r = document.getElementById('robotId').value;
        const d = document.getElementById('opDate').value;
        const path = `logs/${r}/${d}`;
        document.getElementById('summaryDisplay').style.display = 'none';
        if (currentListener) { currentListener.off(); }
        currentListener = db.ref(path);
        currentListener.on('value', snap => {
            const data = snap.val() || {};
            ['left', 'right'].forEach(side => {
                const feed = document.getElementById(`feed-${side}`);
                feed.innerHTML = "";
                if (data[side]) {
                    Object.values(data[side]).reverse().forEach(entry => {
                        const card = document.createElement('div');
                        card.className = 'data-card';
                        card.innerHTML = `
                            <b>${entry.tongLabel}</b><br>
                            Pilots: ${
                                entry.trunks
            ? (() => {
                const counts = {};
                const trunkList = Array.isArray(entry.trunks) ? entry.trunks : Object.values(entry.trunks);
                trunkList.forEach(t => {
                    if (!t || !t.operatorName) return;
                    counts[t.operatorName] = (counts[t.operatorName] || 0) + 1;
                });
                return Object.entries(counts).map(([name, count]) => `${name} (${count})`).join(', ');
            })() : ""
                            }<br>
                            End: ${entry.endAMPM || ""}
                        `;
                        feed.appendChild(card);
                    });
                }
            });
        });
    }

    function showAllOperations() {
        const r = document.getElementById('robotId').value;
        const d = document.getElementById('opDate').value;
        const body = document.getElementById('historyBody');
        const popup = document.getElementById('historyPopup');
        if (!body || !popup) return;
        body.innerHTML = "<tr><td colspan='12'>Loading data...</td></tr>";
        popup.style.display = 'block';
        db.ref(`logs/${r}/${d}`).once('value').then(snap => {
            const data = snap.val();
            if (!data) {
                body.innerHTML = "<tr><td colspan='12'>No data found for this date.</td></tr>";
                return;
            }
            body.innerHTML = ""; 
            let grouped = {};
            ['left', 'right'].forEach(side => {
                if (data[side]) {
                    Object.values(data[side]).forEach(t => {
                        if (t && t.trunks) {
                             const trunkList = Array.isArray(t.trunks) ? t.trunks : Object.values(t.trunks);
                            trunkList.forEach(e => {
                                 if (!e) return;
                                 const k = `${e.tongNumber}-${e.trunkNumber}-${d}-${e.startTime}`;
                                 if (!grouped[k]) { grouped[k] = { tong: e.tongNumber, trunk: e.trunkNumber }; }
                                grouped[k][side] = e;
                            });
                        }
                    });
                }
            });
            const sortedKeys = Object.keys(grouped).sort((a, b) => {
                const partsA = a.split('-'), partsB = b.split('-');
                const tA = parseInt(partsA[0]), trA = parseInt(partsA[1]);
                const tB = parseInt(partsB[0]), trB = parseInt(partsB[1]);
                if (tA !== tB) return tA - tB;
                return trA - trB;
            });
            if (sortedKeys.length === 0) {
                body.innerHTML = "<tr><td colspan='12'>Data exists but no Trunk details found.</td></tr>";
                return;
            }
            let html = "";
            sortedKeys.forEach(k => {
                const i = grouped[k];
                const l = i.left || {};
                const rSide = i.right || {};
                html += `<tr>
                    <td contenteditable="true">${l.operatorName || ""}</td>
                    <td contenteditable="true">${rSide.operatorName || ""}</td>
                    <td>${i.tong}</td>
                    <td>${i.trunk}</td>
                    <td contenteditable="true">${l.startTime ? getFullDateTimeStr(d, l.startTime) : ""}</td>
                    <td contenteditable="true">${l.endTime ? getFullDateTimeStr(d, l.endTime, true, l.startTime) : ""}</td>
                    <td contenteditable="true">${rSide.startTime ? getFullDateTimeStr(d, rSide.startTime) : ""}</td>
                    <td contenteditable="true">${rSide.endTime ? getFullDateTimeStr(d, rSide.endTime, true, rSide.startTime) : ""}</td>
                    <td>${l.duration || "0:00:00"}</td>
                    <td>${rSide.duration || "0:00:00"}</td>
                    <td>0:00:00</td>
                    <td>0:00:00</td>
                    <td>
                        <button style="background:#dc3545;color:white;padding:5px 10px;border:none;border-radius:4px;cursor:pointer"
                        onclick="deleteEntry(${i.tong}, ${i.trunk})">
                        Delete
                        </button>
                    </td>
                </tr>`;
            });
            body.innerHTML = html;
        }).catch(err => {
            body.innerHTML = `<tr><td colspan='12' style='color:red'>Error: ${err.message}</td></tr>`;
        });
    }

    function filterHistoryTable() {
        const query = document.getElementById('historySearch').value.toLowerCase();
        const rows = document.querySelectorAll('#historyBody tr');
        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(query) ? "" : "none";
        });
    }

    function deleteEntry(tong, trunk) {
        const r = document.getElementById('robotId').value;
        const d = document.getElementById('opDate').value;
        const label = `${tong}${suffixes[tong-1]} Tong`;
        const pathKey = label.replace(/ /g, '_');
        if (!confirm("Delete this entry?")) return;
        const updates = {};
        updates[`logs/${r}/${d}/left/${pathKey}/trunks/${trunk-1}`] = null;
        updates[`logs/${r}/${d}/right/${pathKey}/trunks/${trunk-1}`] = null;
        db.ref().update(updates).then(() => {
            alert("Entry deleted successfully!");
            showAllOperations();
            loadRobotData();
        });
    }

   function saveTableEdits() {
        const r = document.getElementById('robotId').value;
        const originalDate = document.getElementById('opDate').value;
        const rows = document.querySelectorAll('#historyBody tr');
        let updates = {};
        rows.forEach(row => {
            const c = row.cells;
            const leftName = c[0].innerText.trim();
            const rightName = c[1].innerText.trim();
            const tong = parseInt(c[2].innerText.trim());
            const trunk = parseInt(c[3].innerText.trim());
            if (!tong || !trunk) return;
            const label = `${tong}${suffixes[tong-1]} Tong`;
            const pathKey = label.replace(/ /g, '_');

            if (leftName) {
                const startText = c[4].innerText.trim();
                const endText = c[5].innerText.trim();
                const startDateObj = new Date(startText);
                const endDateObj = new Date(endText);
                if (isNaN(startDateObj) || isNaN(endDateObj)) return;
                const newDate = startDateObj.toISOString().split('T')[0];
                const s = startDateObj.toTimeString().slice(0,5);
                const e = endDateObj.toTimeString().slice(0,5);
                updates[`logs/${r}/${newDate}/left/${pathKey}/tongLabel`] = label;
                updates[`logs/${r}/${newDate}/left/${pathKey}/trunks/${trunk-1}`] = {
                    operatorName: leftName, tongNumber: tong, trunkNumber: trunk, startTime: s, endTime: e, duration: calculateDuration(s, e)
                };
                updates[`logs/${r}/${newDate}/left/${pathKey}/pilotStats`] = { [leftName]: 1 };
                updates[`logs/${r}/${newDate}/left/${pathKey}/endAMPM`] = formatAMPM(e);
                updates[`logs/${r}/${newDate}/left/${pathKey}/rawEnd`] = e;
                updates[`logs/${r}/${newDate}/left/${pathKey}/duration`] = calculateDuration(s, e);
                if (newDate !== originalDate) { updates[`logs/${r}/${originalDate}/left/${pathKey}/trunks/${trunk-1}`] = null; }
            }
            if (rightName) {
                const startText = c[6].innerText.trim();
                const endText = c[7].innerText.trim();
                const startDateObj = new Date(startText);
                const endDateObj = new Date(endText);
                if (isNaN(startDateObj) || isNaN(endDateObj)) return;
                const newDate = startDateObj.toISOString().split('T')[0];
                const s = startDateObj.toTimeString().slice(0,5);
                const e = endDateObj.toTimeString().slice(0,5);
                updates[`logs/${r}/${newDate}/right/${pathKey}/tongLabel`] = label;
                updates[`logs/${r}/${newDate}/right/${pathKey}/trunks/${trunk-1}`] = {
                    operatorName: rightName, tongNumber: tong, trunkNumber: trunk, startTime: s, endTime: e, duration: calculateDuration(s, e)
                };
                updates[`logs/${r}/${newDate}/right/${pathKey}/pilotStats`] = { [rightName]: 1 };
                updates[`logs/${r}/${newDate}/right/${pathKey}/endAMPM`] = formatAMPM(e);
                updates[`logs/${r}/${newDate}/right/${pathKey}/rawEnd`] = e;
                updates[`logs/${r}/${newDate}/right/${pathKey}/duration`] = calculateDuration(s, e);
                if (newDate !== originalDate) { updates[`logs/${r}/${originalDate}/right/${pathKey}/trunks/${trunk-1}`] = null; }
            }
        });
        db.ref().update(updates).then(() => {
            const firstPath = Object.keys(updates)[0];
            const newDateMatch = firstPath.match(/logs\/[^/]+\/([^/]+)\//);
            if (newDateMatch && newDateMatch[1]) { document.getElementById('opDate').value = newDateMatch[1]; }
            alert("Tong & Trunk updated successfully!");
            showAllOperations();
            loadRobotData();
        });
    }

    function showSummary() {
        const r = document.getElementById('robotId').value;
        const d = document.getElementById('opDate').value;
        db.ref(`logs/${r}/${d}`).once('value').then(snap => {
            const data = snap.val();
            if(!data) return alert("No data.");
            let report = `ARES LOG: ${r} (${d})\n\n`;
            ['left', 'right'].forEach(side => {
                report += `${side.toUpperCase()} SIDE:\n`;
                if(data[side]) Object.values(data[side]).forEach(t => {
                    report += `${t.tongLabel}: End ${t.endAMPM} | Time: ${t.duration}\nPilots: ${Object.keys(t.pilotStats).join(', ')}\n\n`;
                });
            });
            const disp = document.getElementById('summaryDisplay');
            disp.innerText = report; 
            disp.style.display = 'block';
        });
    }

    function doubleWarningReset() {
        if(confirm("Reset counters?")) {
            ['left', 'right'].forEach(s => {
                document.getElementById(`tong-${s}`).selectedIndex = 0;
                document.getElementById(`trunk-${s}`).selectedIndex = 0;
            });
            document.getElementById('summaryDisplay').style.display = 'none';
        }
    }

    function clearFullDatabase() {
        const r = document.getElementById('robotId').value, d = document.getElementById('opDate').value;
        if(confirm("Wipe all data?")) db.ref(`logs/${r}/${d}`).remove().then(() => { closePopup(); loadRobotData(); });
    }

    function closePopup() { document.getElementById('historyPopup').style.display = 'none'; }
    function copyHistoryTable() {
        const el = document.getElementById('historyTable');
        let r = document.createRange(); r.selectNode(el);
        window.getSelection().removeAllRanges(); window.getSelection().addRange(r);
        document.execCommand('copy'); alert("Copied!");
    }

    document.getElementById('robotId').addEventListener('change', loadRobotData);
    document.getElementById('opDate').addEventListener('change', loadRobotData);
    loadRobotData();
</script>
</body>
</html>
