<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E2E-Total-Time-Sheet</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root { --left-color: #0056b3; --right-color: #28a745; --bg: #f0f2f5; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .header-info { display: flex; gap: 20px; margin-bottom: 20px; padding: 15px; background: #e9ecef; border-radius: 8px; align-items: flex-end; }
        .header-info div { flex: 1; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .side-col { padding: 20px; border-radius: 10px; background: #fff; border: 1px solid #ddd; }
        .left-side { border-top: 6px solid var(--left-color); }
        .right-side { border-top: 6px solid var(--right-color); }
        
        label { display: block; font-weight: bold; font-size: 0.8em; margin-bottom: 5px; color: #555; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; }
        
        .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .time-box { background: #f8f9fa; padding: 10px; border-radius: 5px; border: 1px solid #eee; }
        
        button { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; padding: 10px; }
        .btn-now { background: #6c757d; color: white; font-size: 10px; margin-top: 5px; width: 100%; }
        .btn-add { width: 100%; margin: 10px 0; background: #333; color: white; height: 45px; }
        
        .live-feed { margin-top: 10px; height: 250px; overflow-y: auto; background: #fafafa; border: 1px inset #eee; padding: 10px; border-radius: 5px; font-size: 0.85em; }
        .data-card { background: white; border: 1px solid #ddd; padding: 12px; margin-bottom: 10px; border-radius: 6px; border-left: 5px solid #333; position: relative; }
        .edit-badge { position: absolute; top: 5px; right: 5px; background: #ffc107; font-size: 9px; padding: 2px 5px; border-radius: 3px; cursor: pointer; font-weight: bold; }

        .actions { margin-top: 30px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .btn-summary { background: #17a2b8; color: white; height: 50px; }
        .btn-crew-swap { background: #212529; color: white; height: 50px; }
        .btn-reset-cycle { background: var(--danger); color: white; height: 50px; }
        .btn-history { background: #6f42c1; color: white; height: 50px; }

        #summaryDisplay { margin-top: 25px; white-space: pre-wrap; background: #fff; color: #333; padding: 30px; border: 3px solid #333; border-radius: 8px; display: none; font-family: 'Courier New', monospace; line-height: 1.5; }
        
        #historyPopup { display: none; position: fixed; top: 5%; left: 2%; width: 96%; height: 90%; background: white; border: 3px solid #333; border-radius: 12px; z-index: 1000; box-shadow: 0 10px 50px rgba(0,0,0,0.5); overflow: hidden; }
        #popupHeader { background: #333; color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #popupContent { padding: 15px; height: calc(100% - 70px); overflow: auto; }
        
        #historyTable { width: 100%; border-collapse: collapse; font-size: 0.75em; white-space: nowrap; }
        #historyTable th, #historyTable td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        #historyTable thead th { background: #f2f2f2; position: sticky; top: 0; z-index: 10; }
        .close-popup { cursor: pointer; background: var(--danger); color: white; border-radius: 50%; width: 30px; height: 30px; border: none; font-weight: bold; }
        .btn-edit-table { background: #ffc107; padding: 2px 6px; font-size: 10px; border-radius: 3px; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-info">
        <div><label>Robot ID</label>
            <select id="robotId" onchange="loadRobotData()">
                <option>Ares-59</option><option>Ares-54</option><option>Ares-53</option>
                <option>Ares-60</option><option>Ares-55</option>
            </select>
        </div>
        <div><label>Date</label><input type="date" id="opDate" onchange="loadRobotData()"></div>
        <div><label>Cycle Start Time</label><input type="time" id="cycleStartTime" value="11:30"></div>
    </div>

    <div class="dashboard">
        <div class="side-col left-side">
            <h3 style="color:var(--left-color)">LEFT SIDE</h3>
            <input type="hidden" id="edit-idx-left" value="">
            <label>Operator Name</label><input type="text" id="pName-left" placeholder="Pilot Name...">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <select id="tong-left"></select><select id="trunk-left"></select>
            </div>
            <div class="time-grid">
                <div class="time-box"><label>Start</label><input type="time" id="start-left"><button class="btn-now" onclick="setTime('start-left')">NOW</button></div>
                <div class="time-box"><label>End</label><input type="time" id="end-left"><button class="btn-now" onclick="setTime('end-left')">NOW</button></div>
            </div>
            <label>Maintenance Notes</label><input type="text" id="maint-left" placeholder="Notes...">
            <button class="btn-add" id="btn-left" onclick="saveToCloud('left')">SAVE ENTRY</button>
            <div id="feed-left" class="live-feed"></div>
        </div>

        <div class="side-col right-side">
            <h3 style="color:var(--right-color)">RIGHT SIDE</h3>
            <input type="hidden" id="edit-idx-right" value="">
            <label>Operator Name</label><input type="text" id="pName-right" placeholder="Pilot Name...">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <select id="tong-right"></select><select id="trunk-right"></select>
            </div>
            <div class="time-grid">
                <div class="time-box"><label>Start</label><input type="time" id="start-right"><button class="btn-now" onclick="setTime('start-right')">NOW</button></div>
                <div class="time-box"><label>End</label><input type="time" id="end-right"><button class="btn-now" onclick="setTime('end-right')">NOW</button></div>
            </div>
            <label>Maintenance Notes</label><input type="text" id="maint-right" placeholder="Notes...">
            <button class="btn-add" id="btn-right" onclick="saveToCloud('right')">SAVE ENTRY</button>
            <div id="feed-right" class="live-feed"></div>
        </div>
    </div>

    <div class="actions">
        <button class="btn-crew-swap" onclick="swapCrew()">RESET NAMES</button>
        <button class="btn-summary" onclick="showSummary()">VIEW SUMMARY</button>
        <button class="btn-history" onclick="showAllOperations()">SHOW ALL DATA</button> 
        <button class="btn-reset-cycle" onclick="resetCycle()">RESET CYCLE</button>
    </div>
    <div id="summaryDisplay"></div>
</div>

<div id="historyPopup">
    <div id="popupHeader">
        <span>Operation Log Archive</span>
        <div>
            <button onclick="clearFullDatabase()" style="background:var(--danger); color:white; padding:5px 15px; margin-right:5px; border-radius:4px;">CLEAR DATA</button>
            <button onclick="copyHistoryTable()" style="background:#28a745; color:white; padding:5px 15px; margin-right:15px; border-radius:4px;">COPY FOR EXCEL</button>
            <button class="close-popup" onclick="closePopup()">X</button>
        </div>
    </div>
    <div id="popupContent">
        <table id="historyTable">
            <thead>
                <tr>
                    <th colspan="2">Operator</th><th rowspan="2">Tong</th><th rowspan="2">Trunk</th>
                    <th colspan="2">Left Side Time</th><th colspan="2">Right Side Time</th>
                    <th colspan="2">Edit</th>
                </tr>
                <tr>
                    <th>Left</th><th>Right</th><th>Start</th><th>End</th><th>Start</th><th>End</th><th>L</th><th>R</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAI4mN_SeCJV9BRR5HWq1NGMQ5vaos7sbM",
        authDomain: "e2e-time-sheet.firebaseapp.com",
        databaseURL: "https://e2e-time-sheet-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "e2e-time-sheet",
        storageBucket: "e2e-time-sheet.firebasestorage.app",
        messagingSenderId: "547961861130",
        appId: "1:547961861130:web:e6aa01484f4a7cb7e01bf3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Set Initial Date
    const dBox = document.getElementById('opDate');
    if(!dBox.value) dBox.value = new Date().toISOString().split('T')[0];

    // UI Dropdowns
    const suffixes = ["st", "nd", "rd", "th", "th", "th", "th", "th", "th"];
    function setupDropdowns(side) {
        const tong = document.getElementById(`tong-${side}`);
        const trunk = document.getElementById(`trunk-${side}`);
        for(let i=1; i<=9; i++) {
            tong.options.add(new Option(i + suffixes[i-1] + " Tong", i));
            trunk.options.add(new Option(i + suffixes[i-1] + " Trunk", i));
        }
    }
    setupDropdowns('left'); setupDropdowns('right');

    function setTime(id) { document.getElementById(id).value = new Date().toTimeString().slice(0,5); }
    
    function formatAMPM(t24) {
        if(!t24) return "";
        let [h, m] = t24.split(':');
        let am = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return `${h}:${m} ${am}`;
    }

    function formatTimeFull(t24) {
        if(!t24) return "";
        const dateInput = dBox.value; 
        const dateParts = dateInput.split('-');
        const yearShort = dateParts[0].substring(2);
        let [h, m] = t24.split(':');
        let ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return `${dateParts[1]}/${dateParts[2]}/${yearShort} ${String(h).padStart(2, '0')}:${m}:00 ${ampm}`;
    }

    function calculateDuration(s, e) {
        if(!s || !e) return "0:00:00";
        let start = new Date(0,0,0, ...s.split(':'));
        let end = new Date(0,0,0, ...e.split(':'));
        if (end < start) end.setDate(end.getDate() + 1);
        let diff = end - start;
        let hrs = Math.floor(diff/3600000);
        let mins = Math.floor((diff%3600000)/60000);
        return `${hrs}:${mins.toString().padStart(2, '0')}:00`;
    }

    // Dynamic Data Loading
    function loadRobotData() {
        const robot = document.getElementById('robotId').value;
        const dateStr = dBox.value;
        
        db.ref(`logs/${robot}/${dateStr}`).off(); // Clear previous listener
        
        db.ref(`logs/${robot}/${dateStr}`).on('value', (snap) => {
            const data = snap.val() || {};
            ['left', 'right'].forEach(side => {
                const feed = document.getElementById(`feed-${side}`);
                feed.innerHTML = "";
                if(data[side]) {
                    Object.keys(data[side]).sort().reverse().forEach(tk => {
                        const entry = data[side][tk];
                        (entry.trunks || []).forEach((tr, idx) => {
                            const card = document.createElement('div');
                            card.className = 'data-card';
                            card.innerHTML = `<span class="edit-badge" onclick="editEntry('${side}','${tk}',${idx})">EDIT</span>
                                <b>Tong ${tr.tongNumber} - Trunk ${tr.trunkNumber}</b><br>
                                Pilots: ${Object.keys(entry.pilotStats || {}).join(', ')}<br>
                                End: ${tr.endFull.split(' ')[1]} ${tr.endFull.split(' ')[2]}`;
                            feed.prepend(card);
                        });
                    });
                }
            });
        });
    }

    function saveToCloud(side) {
        const p = document.getElementById(`pName-${side}`).value.trim();
        const s = document.getElementById(`start-${side}`).value;
        const e = document.getElementById(`end-${side}`).value;
        const maint = document.getElementById(`maint-${side}`).value.trim();
        const editIdx = document.getElementById(`edit-idx-${side}`).value;
        const tBox = document.getElementById(`tong-${side}`);
        const trBox = document.getElementById(`trunk-${side}`);
        const robot = document.getElementById('robotId').value;
        const dateStr = dBox.value;
        
        if(!p || !s || !e) return alert("Fill all fields!");

        const tLabel = tBox.options[tBox.selectedIndex].text.replace(/ /g, '_');
        const path = `logs/${robot}/${dateStr}/${side}/${tLabel}`;

        db.ref(path).once('value').then((snap) => {
            let data = snap.val() || { tongLabel: tBox.options[tBox.selectedIndex].text, pilotStats: {}, trunks: [] };
            const newTrunk = { 
                operator: p, startFull: formatTimeFull(s), endFull: formatTimeFull(e), 
                rawS: s, rawE: e, tongNumber: tBox.selectedIndex+1, trunkNumber: trBox.selectedIndex+1, maint: maint 
            };

            if(editIdx !== "") {
                data.trunks[editIdx] = newTrunk;
                document.getElementById(`edit-idx-${side}`).value = "";
                document.getElementById(`btn-${side}`).innerText = "SAVE ENTRY";
            } else {
                data.trunks.push(newTrunk);
            }

            // Tong Summary Recalculation
            data.rawStart = data.trunks[0].rawS;
            data.endAMPM = formatAMPM(data.trunks[data.trunks.length-1].rawE);
            data.duration = calculateDuration(data.rawStart, data.trunks[data.trunks.length-1].rawE);
            const pilots = [...new Set(data.trunks.map(t => t.operator))];
            data.pilotStats = {}; pilots.forEach(name => data.pilotStats[name] = true);
            data.maint = data.trunks.filter(t => t.maint).map(t => t.maint).join(' | ');

            return db.ref(path).set(data);
        }).then(() => {
            document.getElementById(`start-${side}`).value = e;
            document.getElementById(`maint-${side}`).value = "";
            if(editIdx === "") trBox.selectedIndex = (trBox.selectedIndex + 1) % 9;
        });
    }

    function editEntry(side, tk, idx) {
        const robot = document.getElementById('robotId').value;
        const dateStr = dBox.value;
        db.ref(`logs/${robot}/${dateStr}/${side}/${tk}/trunks/${idx}`).once('value').then(snap => {
            const v = snap.val();
            document.getElementById(`pName-${side}`).value = v.operator;
            document.getElementById(`tong-${side}`).value = v.tongNumber;
            document.getElementById(`trunk-${side}`).value = v.trunkNumber;
            document.getElementById(`start-${side}`).value = v.rawS;
            document.getElementById(`end-${side}`).value = v.rawE;
            document.getElementById(`maint-${side}`).value = v.maint || "";
            document.getElementById(`edit-idx-${side}`).value = idx;
            document.getElementById(`btn-${side}`).innerText = "UPDATE ENTRY";
            closePopup();
            window.scrollTo(0,0);
        });
    }

    function showSummary() {
        const robot = document.getElementById('robotId').value;
        const dateStr = dBox.value;
        const cycle = formatAMPM(document.getElementById('cycleStartTime').value);
        db.ref(`logs/${robot}/${dateStr}`).once('value').then((snap) => {
            const data = snap.val(); if(!data) return alert("No data!");
            let r = `Note: This cycle started at ${cycle}\n\n`;
            ['left', 'right'].forEach(side => {
                r += `${side.charAt(0).toUpperCase() + side.slice(1)} side:\n`;
                if(data[side]) {
                    Object.keys(data[side]).sort().forEach(k => {
                        const t = data[side][k];
                        r += `${t.tongLabel}:\nEnd: ${t.endAMPM}\nOverall Time: ${t.duration}\nPilots: ${Object.keys(t.pilotStats).join(', ')}\n${t.maint ? 'Maintenance: '+t.maint+'\n' : ''}\n`;
                    });
                }
                if(side === 'left') r += `========================================\n\n`;
            });
            const sDiv = document.getElementById('summaryDisplay');
            sDiv.innerText = r;
            sDiv.style.display = 'block';
            sDiv.scrollIntoView({ behavior: 'smooth' });
        });
    }

    function showAllOperations() {
        const robot = document.getElementById('robotId').value;
        const dateStr = dBox.value;
        db.ref(`logs/${robot}/${dateStr}`).once('value').then((snap) => {
            const data = snap.val(); if(!data) return alert("No data.");
            const body = document.getElementById('historyBody');
            body.innerHTML = "";
            let Ls = [], Rs = [];
            if(data.left) Object.keys(data.left).forEach(tk => data.left[tk].trunks.forEach((t,i) => Ls.push({...t, tk, i})));
            if(data.right) Object.keys(data.right).forEach(tk => data.right[tk].trunks.forEach((t,i) => Rs.push({...t, tk, i})));
            for(let i=0; i<Math.max(Ls.length, Rs.length); i++) {
                const L = Ls[i] || {}; const R = Rs[i] || {};
                body.innerHTML += `<tr>
                    <td>${L.operator||""}</td><td>${R.operator||""}</td>
                    <td>${L.tongNumber||R.tongNumber||""}</td><td>${L.trunkNumber||R.trunkNumber||""}</td>
                    <td>${L.startFull||""}</td><td>${L.endFull||""}</td>
                    <td>${R.startFull||""}</td><td>${R.endFull||""}</td>
                    <td>${L.tk ? `<button class="btn-edit-table" onclick="editEntry('left','${L.tk}',${L.i})">EDIT</button>` : ''}</td>
                    <td>${R.tk ? `<button class="btn-edit-table" onclick="editEntry('right','${R.tk}',${R.i})">EDIT</button>` : ''}</td>
                </tr>`;
            }
            document.getElementById('historyPopup').style.display = 'block';
        });
    }

    function clearFullDatabase() {
        const r = document.getElementById('robotId').value;
        const d = dBox.value;
        if (confirm(`WIPE ALL ${r} data for ${d}?`)) {
            db.ref(`logs/${r}/${d}`).remove().then(() => { alert("Cleared."); closePopup(); });
        }
    }

    function copyHistoryTable() {
        const table = document.getElementById('historyTable');
        let text = "";
        for (let row of table.rows) {
            let rowText = "";
            for (let i=0; i<row.cells.length-2; i++) rowText += row.cells[i].innerText + "\t";
            text += rowText + "\n";
        }
        navigator.clipboard.writeText(text).then(() => alert("Copied!"));
    }

    function closePopup() { document.getElementById('historyPopup').style.display = 'none'; }
    function swapCrew() { document.getElementById('pName-left').value = ""; document.getElementById('pName-right').value = ""; }
    function resetCycle() { if(confirm("Reset counters?")) { document.getElementById('tong-left').selectedIndex=0; document.getElementById('trunk-left').selectedIndex=0; document.getElementById('tong-right').selectedIndex=0; document.getElementById('trunk-right').selectedIndex=0; } }
    
    loadRobotData();
</script>
</body>
</html>
